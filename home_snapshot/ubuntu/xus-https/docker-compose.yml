# =============================================================================
# NEXUS INFRASTRUCTURE - DOCKER COMPOSE OPTIMIZADO
# Sistema de Captacion de Leads High-Ticket
# Arquitectura: n8n Queue Mode + PostgreSQL 16 + Redis 7 + Caddy + Evolution API
# Version: 3.0 - Production-Ready
# Ruta: /home/ubuntu/xus-https/docker-compose.yml
# =============================================================================

# --- VOLUMENES PERSISTENTES (Externos - ya creados en Docker) ---
volumes:
  caddy_data:
    external: true
    name: xus-https_caddy_data
  caddy_config:
    external: true
    name: xus-https_caddy_config
  n8n_data:
    external: true
    name: xus-https_n8n_data
  db_storage:
    external: true
    name: xus-https_db_storage
  redis_data:
    external: true
    name: xus-https_redis_data
  evolution_data:
    external: true
    name: xus-https_evolution_data

# --- RED INTERNA CON IPs ESTATICAS ---
networks:
  n8n-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1450
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1

# =============================================================================
# SERVICIOS
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # POSTGRESQL 16 - Base de Datos Principal (n8n + Evolution API)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: always
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: "xus2026core"
      POSTGRES_DB: n8n
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command:
      - "postgres"
      # --- MEMORIA (Ajustado para 4GB RAM VM) ---
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "effective_cache_size=3GB"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      # --- CHECKPOINT & WAL ---
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=64MB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"
      # --- QUERY PLANNER (SSD Optimized) ---
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "seq_page_cost=1.0"
      # --- CONEXIONES ---
      - "-c"
      - "max_connections=200"
      - "-c"
      - "superuser_reserved_connections=3"
      # --- PARALELISMO ---
      - "-c"
      - "max_parallel_workers_per_gather=2"
      - "-c"
      - "max_parallel_workers=4"
      - "-c"
      - "max_parallel_maintenance_workers=2"
      # --- LOGGING (Produccion) ---
      - "-c"
      - "log_statement=none"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "log_checkpoints=on"
      # --- ESTADISTICAS ---
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "track_activities=on"
      - "-c"
      - "track_counts=on"
    volumes:
      - db_storage:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    networks:
      n8n-network:
        ipv4_address: 172.28.0.30
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    shm_size: '256mb'
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -h localhost -U n8n -d n8n && psql -U n8n -d n8n -c 'SELECT 1' > /dev/null 2>&1
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # REDIS 7 - Broker de Colas y Cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: always
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --tcp-backlog 511
      --timeout 0
      --tcp-keepalive 300
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
    networks:
      n8n-network:
        ipv4_address: 172.28.0.20
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 600M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    sysctls:
      - net.core.somaxconn=511
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # N8N MAIN - Orquestador Principal (UI + Webhook Receiver)
  # ---------------------------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: nexus-n8n-main
    restart: always
    ports:
      - "5678:5678"
    environment:
      # --- IDENTIDAD Y ENDPOINTS ---
      N8N_HOST: nexusys.duckdns.org
      N8N_PROTOCOL: https
      N8N_PORT: "5678"
      WEBHOOK_URL: https://nexusys.duckdns.org
      N8N_EDITOR_BASE_URL: https://nexusys.duckdns.org
      N8N_USER_MANAGEMENT_2FA_ENABLED: false

      # --- ENTORNO ---
      NODE_ENV: production
      N8N_ENVIRONMENT: production
      GENERIC_TIMEZONE: America/Bogota
      TZ: America/Bogota

      # --- BASE DE DATOS ---
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: "xus2026core"
      DB_POSTGRESDB_POOL_SIZE: "30"
      DB_POSTGRESDB_CONNECTION_TIMEOUT: "20000"

      # --- REDIS Y MODO COLA ---
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: "6379"
      QUEUE_BULL_REDIS_DB: "0"
      QUEUE_HEALTH_CHECK_ACTIVE: "true"
      EXECUTIONS_MODE: queue

      # --- SEGURIDAD (CRITICO: misma clave en main y worker) ---
      N8N_ENCRYPTION_KEY: "+JJd4fYw2TQFt/7L5SyHmekOXagf+UFC"
      N8N_SECURE_COOKIE: "true"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "true"
      N8N_BLOCK_IFRAME_EMBED: "false"

      # --- RENDIMIENTO (4GB RAM VM) ---
      NODE_OPTIONS: "--max-old-space-size=2048 --max-http-header-size=16384"
      N8N_DEFAULT_BINARY_DATA_MODE: filesystem
      N8N_BINARY_DATA_STORAGE_PATH: /home/node/.n8n/binaryData
      N8N_CONCURRENCY_PRODUCTION_LIMIT: "25"

      # --- ESTABILIDAD Y RESILIENCIA ---
      N8N_SKIP_WEBHOOK_DEREGISTRATION_ON_SHUTDOWN: "true"
      N8N_GRACEFUL_SHUTDOWN_TIMEOUT: "120"
      N8N_PUSH_BACKEND: websocket
      N8N_RUNNERS_ENABLED: "false"

      # --- LIMPIEZA AUTOMATICA ---
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: "336"
      EXECUTIONS_DATA_PRUNE_MAX_COUNT: "50000"
      EXECUTIONS_DATA_SAVE_ON_ERROR: all
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: all
      EXECUTIONS_DATA_SAVE_ON_PROGRESS: "false"
      EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS: "true"

      # --- LOGS ---
      N8N_LOG_LEVEL: info
      N8N_LOG_OUTPUT: console
      N8N_CUSTOM_EXTENSIONS: "/home/node/.n8n/nodes"
      N8N_COMMUNITY_PACKAGES_ENABLED: "true"

    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      n8n-network:
        ipv4_address: 172.28.0.50
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    extra_hosts:
      - "nexusys.duckdns.org:172.28.0.10"
      - "host.docker.internal:host-gateway"
      - "whatsapp-bridge:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2.5G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://localhost:5678/healthz || exit 1
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # N8N WORKER - Procesador de Tareas Pesadas
  # ---------------------------------------------------------------------------
  n8n-worker:
    image: n8nio/n8n:latest
    container_name: nexus-n8n-worker-1
    restart: always
    command: worker
    environment:
      # --- BASE DE DATOS ---
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: "xus2026core"
      DB_POSTGRESDB_POOL_SIZE: "15"
      DB_POSTGRESDB_CONNECTION_TIMEOUT: "20000"

      # --- REDIS Y COLA ---
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: "6379"
      QUEUE_BULL_REDIS_DB: "0"
      QUEUE_HEALTH_CHECK_ACTIVE: "true"
      EXECUTIONS_MODE: queue

      # --- SEGURIDAD (MISMA CLAVE QUE MAIN) ---
      N8N_ENCRYPTION_KEY: "+JJd4fYw2TQFt/7L5SyHmekOXagf+UFC"

      # --- RENDIMIENTO WORKER ---
      NODE_OPTIONS: "--max-old-space-size=1536"
      N8N_DEFAULT_BINARY_DATA_MODE: filesystem
      N8N_BINARY_DATA_STORAGE_PATH: /home/node/.n8n/binaryData
      N8N_CONCURRENCY_PRODUCTION_LIMIT: "15"

      # --- WORKER SETTINGS ---
      QUEUE_BULL_REDIS_TIMEOUT_THRESHOLD: "30000"
      N8N_GRACEFUL_SHUTDOWN_TIMEOUT: "60"

      # --- ENTORNO ---
      NODE_ENV: production
      GENERIC_TIMEZONE: America/Bogota
      TZ: America/Bogota

      # --- LOGS ---
      N8N_LOG_LEVEL: info
      N8N_LOG_OUTPUT: console
      N8N_CUSTOM_EXTENSIONS: "/home/node/.n8n/nodes"
      N8N_COMMUNITY_PACKAGES_ENABLED: "true"

    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      n8n-network:
        ipv4_address: 172.28.0.51
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    extra_hosts:
      - "nexusys.duckdns.org:172.28.0.10"
      - "host.docker.internal:host-gateway"
      - "whatsapp-bridge:host-gateway"
    depends_on:
      n8n:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test:
        - CMD-SHELL
        - pgrep -f 'n8n worker' || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # CADDY - Reverse Proxy con SSL Automatico (Let's Encrypt)
  # FIX: Health check ya no apunta a /health en :80 (no existe)
  # FIX: depends_on n8n para evitar proxy a upstream inexistente
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2.7-alpine
    container_name: nexus-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      n8n-network:
        ipv4_address: 172.28.0.10
    depends_on:
      n8n:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # EVOLUTION API v2 - WhatsApp Business API
  # FIX: DATABASE_PROVIDER debe ser "postgresql" (no "postgres" ni "PostgreSQL")
  # FIX: Conectada a base de datos "evolution" separada en el mismo PostgreSQL
  # Puerto 8080 expuesto para obtener el codigo QR
  # ---------------------------------------------------------------------------

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: nexus-evolution-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      # --- SERVIDOR ---
      SERVER_TYPE: http
      SERVER_PORT: "8080"
      SERVER_URL: "https://nexusys.duckdns.org"

      # --- BASE DE DATOS ---
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: "postgresql://n8n:${DB_PASSWORD}@postgres:5432/evolution?schema=public"
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"

      # --- AUTENTICACION ---
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: "${EVOLUTION_API_KEY}"
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"

      # --- CACHE REDIS ---
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: "redis://redis:6379/3"
      CACHE_REDIS_PREFIX_KEY: "evolution"
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CACHE_LOCAL_ENABLED: "false"

      # --- WHATSAPP ---
      CONFIG_SESSION_PHONE_CLIENT: "Nexus"
      CONFIG_SESSION_PHONE_NAME: "Chrome"
      QRCODE_LIMIT: "30"
      QRCODE_COLOR: "#000000"

      # --- INSTANCIAS ---
      DEL_INSTANCE: "false"
      DEL_TEMP_INSTANCES: "true"

      # --- WEBHOOKS ---
      WEBHOOK_GLOBAL_ENABLED: "false"
      WEBHOOK_GLOBAL_URL: ""
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"

      # --- CORS (NUEVO - fix para Manager/QR) ---
      CORS_ORIGIN: "*"
      CORS_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
      CORS_CREDENTIALS: "true"

      # --- WEBSOCKET (CAMBIADO a true) ---
      WEBSOCKET_ENABLED: "true"
      WEBSOCKET_GLOBAL_EVENTS: "true"

      # --- INTEGRACIONES ---
      TYPEBOT_ENABLED: "false"
      RABBITMQ_ENABLED: "false"
      SQS_ENABLED: "false"
      S3_ENABLED: "false"

      # --- LOGS ---
      LOG_LEVEL: "ERROR,WARN"
      LOG_COLOR: "true"
      LOG_BAILEYS: "error"

      # --- ZONA HORARIA ---
      TZ: America/Bogota

    volumes:
      - evolution_data:/evolution/instances
    networks:
      n8n-network:
        ipv4_address: 172.28.0.60
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test:
        - CMD
        - node
        - "-e"
        - "require('http').get('http://localhost:8080/',r=>{process.exit(r.statusCode<400?0:1)}).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
