id: guard_openclaw_002
name: No write to sensitive paths
created_at: '2026-03-25T00:30:00.000000+00:00'
created_by: santiago
source: manual
original_instruction: Never write files to sensitive system paths without approval
active: true
priority: 9
scope: agent:openclaw
deterministic:
  keywords_block:
  - /etc/passwd
  - /etc/shadow
  - /etc/sudoers
  - /root/.ssh
  keywords_warn:
  - /etc/
  - /usr/local/
  - ~/.ssh/
  - ~/.bashrc
  - ~/.zshrc
  - /etc/hosts
  regex_block:
  - "write.*->\\s*/etc/"
  - "write.*->\\s*/root/"
  - "write.*->\\s*~/.ssh/"
  exact_block: []
  max_amount: null
semantic:
  enabled: true
  description: Prevent writing to system-critical or security-sensitive paths
  threshold: 0.80
action: block
message: ⛔ Nova bloqueó esta escritura: paths sensibles requieren aprobación.
escalate_to: ''
log: true
notify: []
