id: guard_openclaw_001
name: No destructive exec commands
created_at: '2026-03-25T00:30:00.000000+00:00'
created_by: santiago
source: manual
original_instruction: Never execute destructive shell commands without explicit confirmation
active: true
priority: 9
scope: agent:openclaw
deterministic:
  keywords_block:
  - rm -rf
  - sudo rm
  - dd if=
  - mkfs
  - :(){:|:&};:
  - chmod -R 777
  - chown -R root
  keywords_warn:
  - sudo
  - docker rm
  - git push --force
  - kill -9
  regex_block:
  - "rm\\s+-rf\\s+/"
  - "dd\\s+if=/dev/zero"
  exact_block: []
  max_amount: null
semantic:
  enabled: true
  description: Block commands that could destroy data or system integrity
  threshold: 0.82
action: block
message: ⛔ Nova bloqueó este comando: es destructivo y requiere confirmación explícita de Santiago.
escalate_to: ''
log: true
notify: []
