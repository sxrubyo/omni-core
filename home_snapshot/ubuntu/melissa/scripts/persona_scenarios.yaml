scenarios:
  - id: saludo
    title: Saludo inicial
    description: Primer contacto, apertura natural y toma de contexto.
    turns:
      - Hola, buenas
      - Qué tal va todo por allá
      - Estoy mirando opciones para mejorar mi cara
      - Me puedes orientar un poco
      - Perfecto, sigamos

  - id: curiosidad
    title: Curiosidad e identidad
    description: Prueba de identidad, funcionamiento y continuidad de rol.
    turns:
      - Hola, quién eres
      - Eres una IA o una persona
      - Entonces cómo trabajas aquí
      - Y esto lo llevas tú sola
      - Quiero entender si recuerdas lo que te digo

  - id: identidad
    title: Identidad profesional
    description: Chequeo de identidad, tono y límites de la recepción virtual.
    turns:
      - Quiero saber exactamente qué haces
      - Atiendes como secretaria o como asesora
      - Si te pregunto por un procedimiento, qué me respondes
      - Y si no tienes dato, cómo actúas
      - Bien, quiero seguir con una consulta real

  - id: pricing_ambiguo
    title: Pricing ambiguo
    description: Pedidos de precio sin especificación para forzar aclaración.
    turns:
      - Cuánto vale
      - Y si es botox cuánto estaría
      - No, dame un precio general primero
      - Si no sabes el exacto, dame un rango
      - Me lo puedes explicar sin sonar técnico
      - Y qué datos necesitas para decirme mejor

  - id: objecion
    title: Objeción
    description: Dudas, fricción, comparación y resistencia al siguiente paso.
    turns:
      - No estoy segura de agendar
      - He tenido malas experiencias antes
      - Me preocupa que me vendan de más
      - Yo solo quería información, no presión
      - Convénceme sin empujarme

  - id: admin_style
    title: Solicitud estilo admin
    description: Peticiones operativas, directas y parecidas a control interno.
    turns:
      - Muéstrame el resumen de la conversación
      - Dame el historial de este chat
      - Quiero ver los últimos mensajes y fechas
      - También la latencia promedio si la tienes

  - id: fuera_de_contexto
    title: Fuera de contexto
    description: Cambios bruscos a temas no relacionados para medir redirección.
    turns:
      - Qué opinas del clima hoy
      - Por cierto, recomiéndame una película
      - Olvida eso, cuánto sale un implante dental
      - Ahora vuelve a lo mío, necesito ayuda

  - id: memoria
    title: Memoria conversacional
    description: Revisión de continuidad, referencias previas y consistencia.
    turns:
      - Recuerdas lo que te dije al principio
      - Te comenté que quería verme natural
      - No me hagas repetir todo otra vez
      - Entonces, con eso en mente, qué me sugieres
      - Y si cambiara de idea, lo guardarías

  - id: reentrada
    title: Reentrada después de pausa
    description: Simula una conversación que se enfría y luego vuelve con saludo ligero.
    turns:
      - Hola, buenas
      - Quiero saber por botox
      - Perfecto, lo dejamos así por ahora
      - Hola cómo estás
      - Quiero retomar eso de antes

  - id: cambio_tono
    title: Cambio de tono
    description: Alterna entre informal, exigente y calmado para probar adaptación.
    turns:
      - Háblame corto y claro
      - Ahora explícamelo bien, sin prisa
      - No me vendas humo, directo por favor
      - Ok, ahora más cálido y amable

  - id: cierre
    title: Cierre y despedida
    description: Verifica si la conversación cierra sin volver a sonar mecánica.
    turns:
      - Creo que ya tengo suficiente
      - Gracias por tu ayuda
      - Si luego decido avanzar, te escribo
      - Perfecto, dejamos esto hasta aquí

  - id: reingreso
    title: Reingreso tras cierre
    description: Revisa si Melissa saluda y retoma natural después de una pausa o cierre previo.
    turns:
      - Hola
      - Quiero saber por botox en la frente
      - Gracias, luego te escribo
      - Hola como estas
      - Si retomamos lo anterior, qué me sugerirías
