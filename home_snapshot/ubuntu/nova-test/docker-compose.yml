version: '3.9'

services:

  # ── PostgreSQL — El Ledger vive aquí ──────────────────────────
  db:
    image: postgres:16-alpine
    container_name: nova_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nova
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nova_secret_2026}
    volumes:
      - nova_db_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend API — FastAPI Python ──────────────────────────────
  api:
    build: ./backend
    container_name: nova_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://nova:${POSTGRES_PASSWORD:-nova_secret_2026}@db:5432/nova
      SECRET_KEY: ${SECRET_KEY:-nova_signing_key_change_in_production}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── Frontend — Dashboard Nova ─────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: nova_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "3005:80"
    depends_on:
      - api

volumes:
  nova_db_data:
